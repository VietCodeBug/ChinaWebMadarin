    <style>
    :root {
        --p: #1a73e8;
        --s: #0f9d58;
        --w: #d93025;
        --bg: #f8f9fa;
        --box-bg: #ffffff;
        --text-main: #202124;
        --text-muted: #5f6368;
        --btn-hover: rgba(26, 115, 232, 0.08);
    }

     
    body.theme-gamified {
        --p: #58cc02;
        --s: #58cc02;
        --w: #ff4b4b;
        --bg: #ffffff;
        --box-bg: #fff;
        --text-main: #3c3c3c;
    }

    body.theme-gamified #game-box {
        border: 2px solid #e5e5e5;
        border-bottom-width: 6px;
        box-shadow: none;
        border-radius: 24px;
    }

    body.theme-gamified button {
        border-radius: 16px;
        border-bottom: 4px solid rgba(0, 0, 0, 0.15);
    }

    body.theme-gamified button:active {
        border-bottom-width: 0;
        transform: translateY(4px);
    }

    body.theme-gamified input {
        border-width: 2px;
        border-bottom-width: 4px;
        border-radius: 16px;
    }

     
    body.theme-academic {
        --p: #2c3e50;
        --s: #27ae60;
        --w: #c0392b;
        --bg: #faf9f6;
        --box-bg: #ffffff;
        --text-main: #2c3e50;
        font-family: 'Mali', cursive;
        font-size: 1.1rem;
    }

    body.theme-academic #game-box {
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
        border-radius: 8px;
        border-top: 6px solid var(--p);
    }

    body.theme-academic h1 {
        font-family: 'Mali', cursive;
        font-weight: 700;
    }

    body.theme-academic button,
    body.theme-academic input {
        border-radius: 4px;
        font-family: 'Mali', cursive;
        font-size: 1.2rem;
        font-weight: 600;
    }

     
    body.theme-dark {
        --p: #8ab4f8;
        --s: #81c995;
        --w: #f28b82;
        --bg: #202124;
        --box-bg: #292a2d;
        --text-main: #e8eaed;
        --text-muted: #9aa0a6;
        --btn-hover: rgba(138, 180, 248, 0.08);
    }

    body.theme-dark #game-box {
        border: 1px solid #3c4043;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }

    body.theme-dark .btn-lvl {
        background: #292a2d;
        border-color: #5f6368;
        color: #e8eaed;
    }

    body.theme-dark .btn-lvl:hover {
        background: var(--btn-hover);
        border-color: var(--p);
        color: var(--p);
    }

    body.theme-dark input {
        background: #202124;
        color: #e8eaed;
        border-color: #5f6368;
    }

    body.theme-dark input:disabled {
        background: #3c4043;
        color: #9aa0a6;
    }

    body.theme-dark select,
    body.theme-dark .audio-controls {
        background: #202124;
        color: #e8eaed;
        border-color: #5f6368;
    }

    body.theme-dark .plan-option {
        background: #292a2d;
        border-color: #5f6368;
    }

    body.theme-dark .ck-info-box {
        background: #202124;
        border-color: #5f6368;
        color: #e8eaed;
    }

    body.theme-dark #user-profile,
    body.theme-dark #btn-login-show,
    body.theme-dark #theme-select,
    body.theme-dark .modal-content,
    body.theme-dark .upgrade-modal-box {
        background: #292a2d;
        color: #e8eaed;
        border-color: #5f6368;
    }

    body.theme-dark .btn-home {
        border-color: #5f6368;
        color: #9aa0a6;
    }

    body.theme-dark .btn-home:hover {
        background: #3c4043;
    }

    body.theme-dark .btn-back,
    body.theme-dark .btn-hint {
        color: #e8eaed;
    }

    body.theme-dark .tab-btn {
        color: #9aa0a6;
    }

    body.theme-dark .tab-btn.active {
        color: var(--p);
    }

    body.theme-dark .btn-close-modal {
        background: transparent;
        color: #e8eaed;
    }

    body.theme-dark .btn-close-modal:hover {
        background: #ff4757;
        color: white;
    }

    body {
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        height: 100vh;
        height: 100dvh;
        width: 100vw;
        overflow: hidden;
        margin: 0;
        background: var(--bg);
        color: var(--text-main);
        overscroll-behavior-y: none;
    }

    #game-box {
        background: var(--box-bg);
        padding: 2.5rem;
        border-radius: 24px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        width: 95%;
        max-width: 650px;
        text-align: center;
        margin: auto;
        transition: all 0.3s ease;
        flex: 1;
        min-height: 0;
        max-height: calc(100% - 20px);
        overflow-y: auto;
        box-sizing: border-box;
    }

    @media (max-width: 600px) {
        #game-box {
            padding: 1rem;
            margin: auto;
            border-radius: 16px;
            width: 98%;
        }
        h1 { font-size: 1.4rem; margin-bottom: 0; }
        .header-info { margin-bottom: 5px; font-size: 0.8rem; }
        #vi-text { font-size: 1.3rem; min-height: 3rem; margin: 10px 0; }
        #result-box { padding: 12px; margin-bottom: 12px; font-size: 1.1rem; }
        input { padding: 12px; font-size: 1.1rem; margin-bottom: 15px; }
        .word-block { font-size: 1.15rem; padding: 6px 10px; }
        #construction-target { min-height: 48px; padding: 6px; margin-bottom: 10px; }
        #construction-pool { min-height: 50px; }
        .audio-controls { margin-bottom: 15px; padding: 6px 10px; font-size: 0.8rem; }
        .btns { gap: 8px; margin-bottom: 15px; }
        button { padding: 12px; font-size: 0.9rem; }
        #btn-main { padding: 14px; font-size: 1rem; }
    }

    h1 {
        font-size: 2rem;
        color: var(--p);
        margin-bottom: 5px;
        font-weight: 700;
    }

    .subtitle {
        color: var(--text-muted);
        font-size: 1rem;
        margin-bottom: 30px;
    }

    .lvl-btns {
        display: grid;
        grid-template-columns: 1fr;
        gap: 15px;
        margin-top: 20px;
    }

    .btn-lvl {
        padding: 18px;
        border: 2px solid var(--p);
        border-radius: 12px;
        background: white;
        color: var(--p);
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .btn-lvl:hover {
        background: var(--p);
        color: white;
        transform: translateY(-2px);
        box-shadow: 0 4px 10px rgba(26, 115, 232, 0.2);
    }

    .header-info {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
        font-weight: bold;
        color: var(--text-muted);
        font-size: 0.9rem;
        align-items: center;
    }

    #progress-container {
        width: 100%;
        height: 10px;
        background: #eee;
        border-radius: 5px;
        margin-bottom: 20px;
        overflow: hidden;
    }

    .leaderboard-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #fdf2e9;
        padding: 8px 15px;
        border-radius: 10px;
        border: 1px solid #fdebd0;
        transition: 0.2s;
    }

    .leaderboard-exp {
        font-weight: bold;
        color: #d35400;
    }

    body.theme-dark .leaderboard-item {
        background: #2d2e31;
        border-color: #3c4043;
    }

    body.theme-dark .leaderboard-exp {
        color: #f39c12;
    }

    #progress-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--s), #2ecc71);
        box-shadow: 0 0 10px rgba(46, 204, 113, 0.4);
        transition: width 0.4s ease-out;
    }

    #vi-text {
        font-size: 1.5rem;
        font-weight: bold;
        margin: 15px 0;
        color: var(--p);
        min-height: 4rem;
        display: flex;
        align-items: center;
        justify-content: center;
        line-height: 1.4;
    }

    #result-box {
        font-size: 1.35rem;
        padding: 18px;
        margin-bottom: 20px;
        border-radius: 16px;
        font-weight: 500;
        display: none;
        white-space: pre-wrap;
        line-height: 1.5;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.06);
        transform: translateY(10px);
        opacity: 0;
        animation: slideUp 0.3s forwards;
    }

    @keyframes slideUp {
        to {
            transform: translateY(0);
            opacity: 1;
        }
    }

    .res-correct {
        background: linear-gradient(135deg, #f0fff4, #d4edda);
        color: #155724;
        border: 2px solid #c3e6cb;
    }

    .res-wrong {
        background: linear-gradient(135deg, #fff5f5, #f8d7da);
        color: #721c24;
        border: 2px solid #f5c6cb;
    }



    input {
        width: 100%;
        padding: 16px;
        font-size: 1.3rem;
        border: 2px solid #ddd;
        border-radius: 12px;
        box-sizing: border-box;
        outline: none;
        text-align: center;
        margin-bottom: 15px;
        transition: 0.2s;
    }

    input:focus {
        border-color: var(--p);
        cursor: pointer;
        color: var(--text-muted);
    }

    input:disabled {
        background: #f9f9f9;
        color: #2c3e50;
        font-weight: bold;
    }

    .tab-btn.active {
        border-bottom: 2px solid var(--p);
        color: var(--text-main);
        font-weight: bold;
    }

    .btns {
        display: flex;
        gap: 12px;
        margin-bottom: 20px;
        flex-wrap: wrap;
    }

    button {
        flex: 1;
        padding: 15px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 600;
        color: white;
        font-size: 1rem;
        min-width: 120px;
        transition: all 0.2s;
    }

    button:hover {
        filter: brightness(1.1);
    }

    button:active {
        transform: scale(0.98);
    }

    .btn-back {
        background: #9aa0a6;
        color: #202124;
    }

    .btn-hint {
        background: #fbbc04;
        color: #202124;
    }

    .btn-main {
        background: var(--p);
    }

    .btn-home {
        background: transparent;
        border: 1px solid #dadce0;
        color: var(--text-muted);
        width: 100%;
        border-radius: 12px;
    }

    .btn-home:hover {
        background: #f1f3f4;
    }

    .hidden {
        display: none !important;
    }

    .audio-controls {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
        font-size: 0.9rem;
        color: var(--text-muted);
        background: #f8f9fa;
        padding: 10px;
        border-radius: 8px;
        gap: 8px;
    }

    .audio-controls select {
        flex: 1;
        max-width: 140px;
        padding: 6px;
        border-radius: 6px;
        border: 1px solid #ccc;
        outline: none;
    }

    .audio-controls input[type=range] {
        flex: 1;
        margin: 0;
        padding: 0;
        border: none;
        height: auto;
        max-width: 80px;
    }

    .btn-audio {
        background: #17a2b8;
        padding: 8px 15px;
        border-radius: 8px;
        font-size: 1rem;
        flex: 0;
        min-width: auto;
    }

    @keyframes shake {
        0% { transform: translateX(0); }
        25% { transform: translateX(-5px); }
        50% { transform: translateX(5px); }
        75% { transform: translateX(-5px); }
        100% { transform: translateX(0); }
    }

    .shake {
        animation: shake 0.4s;
    }

    .wrong-flash {
        background-color: #f8d7da !important;
        border-color: #f5c6cb !important;
    }

    #loading-screen {
        font-size: 1.2rem;
        font-weight: bold;
        color: var(--p);
        padding: 40px;
    }

    .spinner {
        border: 4px solid #f3f3f3;
        border-top: 4px solid var(--p);
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 0 auto 20px;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    .stats-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 5px;
        font-weight: 600;
        font-size: 1rem;
        color: var(--text-muted);
    }

    .combo-badge {
        background: #ffa502;
        color: white;
        padding: 2px 8px;
        border-radius: 10px;
        font-size: 0.8rem;
        margin-left: 8px;
        opacity: 0;
        transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        transform: scale(0);
        display: inline-block;
    }

    @keyframes popOut {
        0% { transform: scale(1.1); }
        50% { transform: scale(1.4); }
        100% { transform: scale(1.1); }
    }

    .combo-badge.pop {
        animation: popOut 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .combo-badge.active {
        opacity: 1;
        transform: scale(1.1);
    }

    .input-group {
        position: relative;
        margin-bottom: 15px;
    }

    .input-group input {
        width: 100%;
        margin-bottom: 0;
    }

    .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1000;
    }

    .modal-content {
        background: white;
        padding: 25px;
        border-radius: 20px;
        text-align: center;
        position: relative;
        width: 250px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    }

    .btn-close-modal {
        position: absolute;
        top: 5px;
        right: 5px;
        width: 28px;
        height: 28px;
        min-width: auto;
        padding: 0;
        background: transparent;
        border: none;
        border-radius: 50%;
        font-size: 1.5rem;
        line-height: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: #5f6368;
        transition: all 0.2s;
        z-index: 100;
    }

    .btn-close-modal:hover {
        background: #ff4757;
        color: white;
        transform: scale(1.1);
    }

    #online-counter {
        position: fixed;
        top: 15px;
        left: 15px;
        background: rgba(255, 255, 255, 0.9);
        padding: 8px 15px;
        border-radius: 20px;
        font-size: 0.9rem;
        font-weight: bold;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        z-index: 1000;
        color: var(--p);
        display: none;
        align-items: center;
        gap: 5px;
    }

    .pulse-dot {
        width: 10px;
        height: 10px;
        background-color: #2ecc71;
        border-radius: 50%;
        display: inline-block;
        animation: dotPulse 1.5s infinite;
    }

    @keyframes dotPulse {
        0% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.7); }
        70% { box-shadow: 0 0 0 8px rgba(46, 204, 113, 0); }
        100% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); }
    }

     
    .zh-word {
        display: inline;
        cursor: pointer;
        border-radius: 4px;
        padding: 0;
        transition: background 0.15s ease, color 0.15s ease;
        -webkit-tap-highlight-color: transparent;
    }

    .zh-word:hover {
        background: rgba(26, 115, 232, 0.12);
        color: var(--p);
    }

    .zh-word.active-word {
        background: rgba(26, 115, 232, 0.2);
        color: var(--p);
    }

     
    #word-popup {
        position: fixed;
        z-index: 9999;
        background: var(--box-bg);
        border-radius: 16px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18), 0 2px 8px rgba(0, 0, 0, 0.10);
        border: 1px solid rgba(26, 115, 232, 0.15);
        padding: 0;
        min-width: 180px;
        max-width: 260px;
        opacity: 0;
        transform: translateY(6px) scale(0.97);
        transition: opacity 0.18s ease, transform 0.18s ease;
        pointer-events: none;
        overflow: hidden;
    }

    #word-popup.visible {
        opacity: 1;
        transform: translateY(0) scale(1);
        pointer-events: auto;
    }

    #word-popup-header {
        background: linear-gradient(135deg, var(--p), #6c3de8);
        padding: 12px 16px 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
    }

    #word-popup-hanzi {
        font-size: 1.6rem;
        font-weight: 700;
        color: white;
        line-height: 1;
        letter-spacing: 2px;
    }

    #word-popup-speak {
        background: rgba(255, 255, 255, 0.2);
        border: none;
        border-radius: 50%;
        width: 36px;
        height: 36px;
        min-width: 36px;
        flex: none;
        cursor: pointer;
        color: white;
        font-size: 1.1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s;
        padding: 0;
    }

    #word-popup-speak:hover,
    #word-popup-speak:active {
        background: rgba(255, 255, 255, 0.35);
    }

    #word-popup-body {
        padding: 12px 16px 14px;
    }

    #word-popup-pinyin {
        font-size: 1rem;
        font-weight: 600;
        color: #e67e22;
        margin-bottom: 6px;
        letter-spacing: 0.5px;
    }

    #word-popup-meaning {
        font-size: 0.95rem;
        font-weight: 700;
        color: var(--text-main);
        line-height: 1.5;
    }

    #word-popup-loading {
        font-size: 0.85rem;
        color: var(--text-muted);
        font-style: italic;
    }

    body.theme-dark #word-popup {
        border-color: #5f6368;
    }

    @media (max-width: 400px) {
        #word-popup {
            min-width: 150px;
            max-width: 210px;
        }
        #word-popup-hanzi {
            font-size: 1.3rem;
        }
    }

     
    .upgrade-modal-box {
        background: var(--box-bg);
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.18);
        width: 480px;
        max-width: 94vw;
        position: relative;
        color: var(--text-main);
        max-height: 90vh;
        overflow-y: auto;
    }

    .upgrade-modal-header {
        background: linear-gradient(135deg, var(--p), #6c3de8);
        color: white;
        padding: 22px 28px 16px;
        text-align: center;
    }

    .upgrade-modal-header h2 {
        margin: 0 0 4px;
        font-size: 1.4rem;
    }

    .upgrade-modal-header p {
        margin: 0;
        font-size: 0.85rem;
        opacity: 0.9;
    }

    .upgrade-modal-body {
        padding: 22px 24px;
        min-height: 480px;
        display: flex;
        flex-direction: column;
    }

    .upgrade-step {
        flex: 1;
        display: none;
    }

    .upgrade-step.active {
        display: block;
    }

    .plan-option {
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        padding: 14px 16px;
        margin-bottom: 10px;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: all 0.2s;
        background: var(--box-bg);
    }

    .plan-option:hover {
        border-color: var(--p);
        background: var(--btn-hover);
    }

    .plan-option.selected {

    function toggleTools() {

    function showToast(message, isError = true) {
        const container = document.getElementById('toast-container');
        container.innerHTML = "";
        const toast = document.createElement('div');
        toast.style.background = isError ? '#ff4757' : '#2ecc71';
        toast.style.color = '#fff';
        toast.style.padding = '12px 24px';
        toast.style.borderRadius = '8px';
        toast.style.boxShadow = '0 4px 12px rgba(0,0,0,0.15)';
        toast.style.fontWeight = 'bold';
        toast.style.fontSize = '0.95rem';
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(-20px)';
        toast.style.transition = 'all 0.3s ease';
        toast.style.textAlign = 'center';
        toast.style.lineHeight = '1.5';
        toast.innerHTML = message;
        container.appendChild(toast);
        setTimeout(() => { toast.style.opacity = '1'; toast.style.transform = 'translateY(0)'; }, 10);
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transform = 'translateY(-20px)';
            setTimeout(() => toast.remove(), 300);
        }, 7000);
    }

    function showHelpModal() { document.getElementById('help-modal').classList.remove('hidden'); }

    function copySTKToClipboard(text) {
        const input = document.createElement("input");
        input.value = text;
        input.style.position = "absolute";
        input.style.opacity = "0";
        document.body.appendChild(input);
        input.select();
        input.setSelectionRange(0, 99999);
        try {
            document.execCommand('copy');
            showToast('Đã copy số tài khoản!', false);
        } catch (err) {
            showToast('Thiết bị không hỗ trợ tính năng copy!', true);
        }
        document.body.removeChild(input);
    }

    
    let selectedPlanId = null;
    let selectedPlanLabel = '';
    let selectedPlanAmount = 0;
    
    function formatVND(n) {
        return n.toLocaleString('vi-VN') + 'đ';
    }

    function renderPricingPlans() {
        const container = document.getElementById('pricing-plans-container');
        if (!container || container.innerHTML.trim() !== '') return; 
        
        let html = '';
        if (typeof GLOBAL_PRICING !== 'undefined' && Array.isArray(GLOBAL_PRICING)) {
            GLOBAL_PRICING.forEach(plan => {
                const savePercent = plan.oldPrice > 0 ? Math.round((1 - plan.price / plan.oldPrice) * 100) : 0;
                const saveText = savePercent > 0 ? `Tiết kiệm ~${savePercent}%` : '';
                const popularBadge = plan.isPopular ? `<span class="popular-badge">Phổ biến nhất<\/span>` : '';
                const classNames = plan.isPopular ? "plan-option popular-plan" : "plan-option";
                const fmtPrice = formatVND(plan.price);
                const fmtOld = plan.oldPrice > 0 ? formatVND(plan.oldPrice) : '';
                
                html += `
                <div class="${classNames}" id="plan-${plan.id}" onclick="selectPlan('${plan.id}', '${fmtPrice}', ${plan.price})">
                    ${popularBadge}
                    <div>
                        <div class="plan-name">${plan.name}<\/div>
                        <div class="plan-old">${fmtOld}<\/div>
                    <\/div>
                    <div style="text-align:right">
                        <div class="plan-price">${fmtPrice}<\/div>
                        <div class="plan-save">${saveText}<\/div>
                    <\/div>
                <\/div>`;
            });
        }
        
        container.innerHTML = html;
        
        
        if (typeof GLOBAL_PRICING !== 'undefined' && GLOBAL_PRICING.length > 0) {
            const defaultPlan = GLOBAL_PRICING.find(p => p.isPopular) || GLOBAL_PRICING[0];
            selectPlan(defaultPlan.id, formatVND(defaultPlan.price), defaultPlan.price);
        }
    }

    function selectPlan(planId, label, amount) {
        selectedPlanId = planId;
        selectedPlanLabel = label;
        selectedPlanAmount = amount;
        document.querySelectorAll('.plan-option').forEach(el => el.classList.remove('selected'));
        const el = document.getElementById('plan-' + planId);
        if(el) el.classList.add('selected');
    }

    function proceedToPayment() {
        if (!selectedPlanId) { showToast('Vui lòng chọn gói trước!', true); return; }
        const gmail = currentEmail || document.getElementById('upg-gmail').value.trim();
        
        let displayContent = gmail;
        if (!displayContent) {
            displayContent = "SĐT hoặc Gmail của bạn";
        } else if (displayContent.includes('@')) {
            displayContent = displayContent.split('@')[0];

        if (!currentEmail || !currentToken) return;

        google.script.run.withSuccessHandler(function(res) {
            if (res && res.success) {

                    document.getElementById('profile-modal-title').innerText = parts.slice(1).join(' ') || "Tân binh";

                if (res.badges && res.badges.length > 0) {
                    let badgeHTML = '';

                        if(BADGE_INFO[bId]) {
                            badgeHTML += `<div style="background: rgba(255,165,0,0.15); border: 1px solid rgba(255,165,0,0.3); border-radius: 8px; padding: 5px 8px; display: inline-flex; align-items: center; gap: 5px;" title="${BADGE_INFO[bId].name}">
                                <span style="font-size: 1.2rem;">${BADGE_INFO[bId].icon}<\/span>
                            <\/div>`;

                    });
                    badgeContainer.innerHTML = badgeHTML;
                } else {

                }

            } else {
                showToast("Không thể tải thông tin hồ sơ", true);
            }
        }).getUserStats(currentEmail, currentToken);
    }

    function _renderLeaderboardData(data) {
        const container = document.getElementById('leaderboard-list');
        const loader = document.getElementById('leaderboard-loader');
        const updatedEl = document.getElementById('leaderboard-updated');
        loader.style.display = 'none';
        
        if (!data || data.length === 0) {
            container.innerHTML = '<div style="color:var(--text-muted); font-size:0.9rem;">Chưa có dữ liệu bảng xếp hạng ngày hôm nay.<\/div>';
            return;
        }
        let html = '';
        data.forEach((user, index) => {
            let badge = '';
            if(index === 0) badge = '👑';
            else if(index === 1) badge = '🥈';
            else if(index === 2) badge = '🥉';
            else badge = `<span style="display:inline-block; width:20px; text-align:center; font-weight:bold; color:#777">${index + 1}<\/span>`;

            html += `
            <div class="leaderboard-item" style="margin-bottom: 8px;">
                <div>${badge} <span style="font-weight:600; color:var(--text-main); margin-left:8px;">${user.user}<\/span><\/div>
                <div class="leaderboard-exp">🔥 ${user.exp.toLocaleString('vi-VN')}<\/div>
            <\/div>`;
        });
        container.innerHTML = html;
        if (updatedEl) {
            const now = new Date();
            updatedEl.innerText = `Cập nhật lúc ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
        }
    }

    // Load Leaderboard (dùng cache – nhanh)
    function loadLeaderboard() {
        google.script.run
            .withSuccessHandler(_renderLeaderboardData)
            .withFailureHandler(() => {
                document.getElementById('leaderboard-loader').innerText = 'Không thể tải Bảng xếp hạng lúc này.';
            }).getLeaderboard();
    }

    
    function refreshLeaderboard() {
        const btn = document.getElementById('btn-refresh-leaderboard');
        const loader = document.getElementById('leaderboard-loader');
        if (btn) { btn.innerText = '⏳'; btn.disabled = true; }
        if (loader) { loader.style.display = 'block'; loader.innerText = 'Đang làm mới...'; }
        document.getElementById('leaderboard-list').innerHTML = '';

        google.script.run
            .withSuccessHandler(data => {
                if (btn) { btn.innerText = '🔄'; btn.disabled = false; }
                _renderLeaderboardData(data);
            })
            .withFailureHandler(() => {
                if (btn) { btn.innerText = '🔄'; btn.disabled = false; }
                if (loader) loader.innerText = 'Không thể tải Bảng xếp hạng lúc này.';
            }).getLeaderboardForceRefresh();
    }
    
    
    window.addEventListener('load', loadLeaderboard);
<\/script>

    <script>
    

    let currentPopupWord = '';
    let activeWordSpan = null;

    

    function segmentChineseText(text, viPlus) {
        if (!text) return '';
        let html = '';

        
        
        let meaningMap = {}; 
        if (viPlus && text.includes('|') && viPlus.includes('|')) {
            const vpSegments = viPlus.split('|');
            const zhSegments = text.split('|');
            
            if (vpSegments.length === zhSegments.length) {
                zhSegments.forEach((seg, i) => {
                    if (vpSegments[i] !== undefined) {
                        meaningMap[i] = vpSegments[i].trim();
                    }
                });
            }
        }

        if (text.includes('|')) {
            const segments = text.split('|');
            let zhWordIdx = 0; 
            for (let i = 0; i < segments.length; i++) {
                const s = segments[i];
                if (!s) { zhWordIdx++; continue; }
                if (/[\u4e00-\u9fff\u3400-\u4dbf]/.test(s)) {
                    const meaning = meaningMap[i] || '';
                    const dataMeaning = meaning ? ` data-meaning="${meaning.replace(/"/g, '&quot;')}"` : '';
                    html += `<span class="zh-word" data-word="${s.replace(/"/g, '&quot;')}"${dataMeaning}>${s}<\/span>`;
                } else {
                    html += s;
                }
                zhWordIdx++;
            }
        } else {
            // Không có dấu | → không thể map viPlus, fallback về segmentation tự động
            if (!('Segmenter' in Intl)) {
                return text.split('').map(ch => {
                    if (/[\u4e00-\u9fff\u3400-\u4dbf]/.test(ch)) {
                        return `<span class="zh-word" data-word="${ch}">${ch}<\/span>`;
                    }
                    return ch;
                }).join('');
            }
            const segmenter = new Intl.Segmenter('zh', { granularity: 'word' });
            const segments = [...segmenter.segment(text)];
            for (const seg of segments) {
                const s = seg.segment;
                if (seg.isWordLike && /[\u4e00-\u9fff\u3400-\u4dbf]/.test(s)) {
                    html += `<span class="zh-word" data-word="${s.replace(/"/g, '&quot;')}">${s}<\/span>`;
                } else {
                    html += s;
                }
            }
        }
        return html;
    }

    /**
     * Gắn sự kiện click vào tất cả .zh-word trong một container.
     * Dùng Event Delegation để tiết kiệm bộ nhớ.
     */
    function attachWordClickListeners(container) {
        if (!container) return;
        container.removeEventListener('click', _onContainerWordClick);
        container.addEventListener('click', _onContainerWordClick);
    }

    function _onContainerWordClick(e) {
        const span = e.target.closest('.zh-word');
        if (!span) { closeWordPopup(); return; }
        e.stopPropagation();
        const word = span.dataset.word;
        if (word) handleWordClick(word, span, e);
    }

    function handleWordClick(word, spanEl, event) {
        if (activeWordSpan) activeWordSpan.classList.remove('active-word');
        activeWordSpan = spanEl;
        spanEl.classList.add('active-word');
        currentPopupWord = word;
        showWordPopup(word, spanEl);
    }

    function showWordPopup(word, anchorEl) {
        const popup = document.getElementById('word-popup');
        const pinyinEl = document.getElementById('word-popup-pinyin');
        const meaningEl = document.getElementById('word-popup-meaning');
        const loadingEl = document.getElementById('word-popup-loading');
        const hanziEl = document.getElementById('word-popup-hanzi');

        hanziEl.textContent = word;
        pinyinEl.textContent = '';
        meaningEl.textContent = '';
        loadingEl.style.display = 'block';

        // Lấy Pinyin từ thư viện phía client (không cần API)
        try {
            if (window.pinyinPro && window.pinyinPro.pinyin) {
                const py = window.pinyinPro.pinyin(word, { toneType: 'symbol', type: 'string', separator: ' ' });
                pinyinEl.textContent = py;
            } else if (window.PinyinPro && window.PinyinPro.pinyin) {
                const py = window.PinyinPro.pinyin(word, { toneType: 'symbol', type: 'string', separator: ' ' });
                pinyinEl.textContent = py;
            }
        } catch(e) {}

        popup.classList.add('visible');
        positionPopup(popup, anchorEl);

        // --- ƯU TIÊN: Lấy nghĩa từ data-meaning (cột Tiếng Việt - Plus) ---
        // Không cần gọi API, hiển thị tức thì và chính xác theo dữ liệu đã chuẩn hóa
        const cachedMeaning = anchorEl ? anchorEl.dataset.meaning : null;
        if (cachedMeaning) {
            loadingEl.style.display = 'none';
            meaningEl.textContent = cachedMeaning;
            // Thêm badge nhỏ để người dùng biết nguồn dữ liệu
            meaningEl.title = 'Từ cột Tiếng Việt - Plus';
            positionPopup(popup, anchorEl);
            return; // Dừng ở đây, không gọi API
        }

        // --- FALLBACK: Gọi Google Translate API khi không có data-meaning ---
        meaningEl.title = '';
        google.script.run
            .withSuccessHandler(function(res) {
                loadingEl.style.display = 'none';
                if (res && res.success) {
                    meaningEl.textContent = res.meaning || '(Không có nghĩa)';
                } else {
                    meaningEl.textContent = '(Không thể dịch)';
                }
                positionPopup(popup, anchorEl);
            })
            .withFailureHandler(function() {
                loadingEl.style.display = 'none';
                meaningEl.textContent = '(Lỗi kết nối)';
            })
            .translateWord(word);
    }

    function positionPopup(popup, anchorEl) {
        const rect = anchorEl.getBoundingClientRect();
        const popupWidth = popup.offsetWidth || 200;
        const popupHeight = popup.offsetHeight || 110;
        const margin = 8;
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        let top = rect.top - popupHeight - margin;
        let left = rect.left + rect.width / 2 - popupWidth / 2;
        if (top < margin) top = rect.bottom + margin;
        if (left + popupWidth > vw - margin) left = vw - popupWidth - margin;
        if (left < margin) left = margin;
        if (top + popupHeight > vh - margin) top = vh - popupHeight - margin;
        popup.style.top = top + 'px';
        popup.style.left = left + 'px';
    }

    function closeWordPopup() {
        document.getElementById('word-popup').classList.remove('visible');
        if (activeWordSpan) { activeWordSpan.classList.remove('active-word'); activeWordSpan = null; }
        currentPopupWord = '';
    }

    function speakPopupWord() {
        if (!currentPopupWord) return;
        // Loại bỏ dấu | phòng trường hợp từ vẫn còn ký tự phân tách
        const text = currentPopupWord.replace(/\|/g, '');
        if (!text) return;
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'zh-CN';
        msg.rate = parseFloat(document.getElementById('audio-speed').value) || 1.0;
        if (availableVoices.length > 0 && voiceSelect.value !== '') {
            const selectedVoice = availableVoices[voiceSelect.value];
            if (selectedVoice) msg.voice = selectedVoice;
        }
        window.speechSynthesis.speak(msg);
    }

    // Đóng popup khi click ra ngoài
    document.addEventListener('click', function(e) {
        const popup = document.getElementById('word-popup');
        if (!popup.contains(e.target) && !e.target.closest('.zh-word')) {
            closeWordPopup();
        }
    });

    // Hỗ trợ phím Escape
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeWordPopup();
    });

    function renderSegmentedChinese(containerEl, text) {
        containerEl.innerHTML = segmentChineseText(text);
        attachWordClickListeners(containerEl);
    }

    function renderUnitList() {
        const container = document.getElementById('unit-list');
        container.innerHTML = "";
        const prog = globalProgress || {};
        // Sắp xếp các Unit: Ưu tiên loại Free trước, Pro sau. Nếu cùng loại thì sắp xếp theo tên bài.
        const sortedUnits = Object.keys(groupedUnits).sort((a, b) => {
            const aIsPro = groupedUnits[a].some(it => it.type !== 'free');
            const bIsPro = groupedUnits[b].some(it => it.type !== 'free');
            
            if (aIsPro !== bIsPro) {
                return aIsPro ? 1 : -1; 
            }
            return a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' });
        });

        sortedUnits.forEach(unitName => {
            const items = groupedUnits[unitName];
            const isPremiumUnit = items.some(it => it.type !== 'free');
            const total = items.length;
            let learnedCount = 0;
            items.forEach(it => { if (prog[it.vi]) learnedCount++; });
            const isDone = learnedCount >= total;
            const isLocked = isPremiumUnit && !globalIsPremium;
            const btn = document.createElement('button');
            btn.className = 'btn-lvl';
            let contentHTML = `<span>${unitName} ${isLocked ? "🔒" : ""}<\/span>`;
            contentHTML += `<div style="font-size:0.85rem; margin-top:5px; color:${isDone ? "var(--s)" : "#7f8c8d"}">
                Tiến độ: ${learnedCount}/${total} ${isDone ? "✅" : ""}
            <\/div>`;
            btn.innerHTML = contentHTML;
            if (isDone) btn.style.borderColor = "var(--s)";
            if (isLocked) { btn.style.opacity = "0.7"; btn.style.background = "#f4f6f8"; }
            btn.onclick = () => { if (isLocked) { showPriceModal(); return; } startUnit(unitName); };
            container.appendChild(btn);
        });
        const btnUpdate = document.createElement('button');
        btnUpdate.className = 'btn-lvl';
        btnUpdate.innerText = 'Đang cập nhật...';
        btnUpdate.disabled = true;
        btnUpdate.style.opacity = '0.5';
        btnUpdate.style.cursor = 'not-allowed';
        container.appendChild(btnUpdate);
    }

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBeep(type) {
        try {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.setValueAtTime(1200, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.3);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            }
        } catch (e) { console.warn("Audio disabled", e); }
    }

    function prepareConstructionTask(q) {
        const target = document.getElementById('construction-target');
        const pool = document.getElementById('construction-pool');
        target.innerHTML = ''; pool.innerHTML = '';
        currentBlocks = [];

        
        
        const isMeaningfulSegment = s => /[\p{L}\p{N}]/u.test(s);

        let segments = [];
        let meaningMap = {};
        if (q.zh.includes('|')) {
            const zhSegsRaw = q.zh.split('|'); 

            
            
            const vpSegsRaw = (q.viPlus && q.viPlus.includes('|'))
                ? q.viPlus.split('|')
                : [];
            const vpLengthMatches = vpSegsRaw.length === zhSegsRaw.length;

            let filteredIdx = 0;
            zhSegsRaw.forEach((seg, i) => {
                if (seg.trim() === '') return; 
                if (!isMeaningfulSegment(seg)) return; 
                
                segments.push(seg);
                if (vpLengthMatches && vpSegsRaw[i] && vpSegsRaw[i].trim()) {
                    meaningMap[filteredIdx] = vpSegsRaw[i].trim();
                }
                filteredIdx++;
            });
        } else {
            if ('Segmenter' in Intl) {
                const segmenter = new Intl.Segmenter('zh', { granularity: 'word' });
                segments = [...segmenter.segment(q.zh)]
                    .map(s => s.segment)
                    .filter(s => s.trim() !== "" && isMeaningfulSegment(s));
            } else {
                segments = q.zh.split('').filter(s => s.trim() !== "" && isMeaningfulSegment(s));
            }
        }

        
        if (segments.length === 1) {
            
            const correctZh = segments[0];
            const correctMeaning = meaningMap[0] || '';

            
            
            const getCleanZh = (zhStr) => {
                if (zhStr.includes('|')) {
                    return zhStr.split('|')
                        .filter(s => s.trim() !== '' && isMeaningfulSegment(s))
                        .join('');
                }
                return zhStr.replace(/[^\p{L}\p{N}]/gu, '').trim();
            };

            let candidatePool = [];
            const currentUnitName = q.unit || '';
            if (currentUnitName && groupedUnits[currentUnitName]) {
                groupedUnits[currentUnitName].forEach(item => {
                    const itemZh = getCleanZh(item.zh);
                    if (itemZh && itemZh !== correctZh) {
                        candidatePool.push({ zh: itemZh, vi: item.vi });
                    }
                });
            }
            if (candidatePool.length < 3 && fullData.length > 3) {
                fullData.forEach(item => {
                    const itemZh = getCleanZh(item.zh);
                    if (itemZh && itemZh !== correctZh && !candidatePool.some(c => c.zh === itemZh)) {
                        candidatePool.push({ zh: itemZh, vi: item.vi });
                    }
                });
            }
            for (let i = candidatePool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [candidatePool[i], candidatePool[j]] = [candidatePool[j], candidatePool[i]];
            }
            const distractorItems = candidatePool.slice(0, 3);
            const choices = [
                { zh: correctZh, meaning: correctMeaning, isCorrect: true },
                ...distractorItems.map(d => ({ zh: d.zh, meaning: '', isCorrect: false }))
            ];
            for (let i = choices.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [choices[i], choices[j]] = [choices[j], choices[i]];
            }
            choices.forEach(choice => {
                const btn = document.createElement('div');
                btn.className = 'word-block in-pool';
                btn.innerText = choice.zh;
                if (choice.meaning) btn.dataset.meaning = choice.meaning;
                btn.onclick = () => {
                    if (isReviewing) return;
                    if (btn.classList.contains('in-pool')) {
                        const existingInTarget = target.querySelectorAll('.word-block.in-target');
                        existingInTarget.forEach(b => {
                            b.classList.remove('in-target');
                            b.classList.add('in-pool');
                            pool.appendChild(b);
                        });
                        btn.classList.remove('in-pool');
                        btn.classList.add('in-target');
                        target.appendChild(btn);
                    } else if (btn.classList.contains('in-target')) {
                        btn.classList.remove('in-target');
                        btn.classList.add('in-pool');
                        pool.appendChild(btn);
                    }
                };
                pool.appendChild(btn);
            });
            return;
        }

        
        
        const allBlocks = [...segments];
        for (let i = allBlocks.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [allBlocks[i], allBlocks[j]] = [allBlocks[j], allBlocks[i]];
        }

        allBlocks.forEach((text, i) => {
            const btn = document.createElement('div');
            btn.className = 'word-block in-pool';
            btn.innerText = text;
            
            const segIdx = segments.indexOf(text);
            if (segIdx !== -1 && meaningMap[segIdx] !== undefined) {
                btn.dataset.meaning = meaningMap[segIdx];
            }
            
            btn.onclick = () => {
                if (isReviewing) return;
                if (btn.classList.contains('in-pool')) {
                    btn.classList.remove('in-pool');
                    btn.classList.add('in-target');
                    target.appendChild(btn);
                } else if (btn.classList.contains('in-target')) {
                    btn.classList.remove('in-target');
                    btn.classList.add('in-pool');
                    pool.appendChild(btn);
                }
            };
            pool.appendChild(btn);
        });
    }

    function getHighlightedAnswerHTML(user, q) {
        const isPinyinInput = /[a-z]/i.test(user);
        let userNorm = normalize(user); 
        let uIdx = 0; 
        let finalZhHTML = "";
        let finalPinyinHTML = "";

        

        function renderChar(ch) {
            if (ch === '|') return ''; 
            if (!/[\p{L}\p{N}]/u.test(ch)) {
                
                return `<span style="color:var(--s); font-weight:bold">${ch}<\/span>`;
            }
            // Chữ / số → so sánh
            let out;
            if (uIdx < userNorm.length && userNorm[uIdx] === ch.toLowerCase()) {
                out = `<span style="color:var(--s); font-weight:bold">${ch}<\/span>`;
            } else {
                out = `<span style="color:var(--w); font-weight:bold">${ch}<\/span>`;
            }
            uIdx++;
            return out;
        }

         
        function renderString(str) {
            let html = '';
            for (const ch of str) html += renderChar(ch);
            return html;
        }

        if (isPinyinInput && q.pinyin) {
            
            finalPinyinHTML = renderString(q.pinyin);
            finalZhHTML = segmentChineseText(q.zh); 
        } else {
            
            if (q.zh.includes('|')) {
                
                
                let meaningMap = {};
                if (q.viPlus && q.viPlus.includes('|')) {
                    const vpSegs = q.viPlus.split('|');
                    const zhSegs = q.zh.split('|');
                    if (vpSegs.length === zhSegs.length) {
                        zhSegs.forEach((_, i) => { if (vpSegs[i]) meaningMap[i] = vpSegs[i].trim(); });
                    }
                }
                const segs = q.zh.split('|').filter(s => s.trim());
                let segIdx = 0;
                for (const seg of segs) {
                    if (/[\u4e00-\u9fff\u3400-\u4dbf]/.test(seg)) {
                        const meaning = meaningMap[segIdx] || '';
                        const dataMeaning = meaning ? ` data-meaning="${meaning.replace(/"/g, '&quot;')}"` : '';
                        finalZhHTML += `<span class="zh-word" data-word="${seg.replace(/"/g, '&quot;')}"${dataMeaning}>${renderString(seg)}<\/span>`;
                    } else {
                        finalZhHTML += renderString(seg);
                    }
                    segIdx++;
                }
            } else if ('Segmenter' in Intl) {
                // Dùng Intl.Segmenter để tách từ tự động
                const segmenter = new Intl.Segmenter('zh', { granularity: 'word' });
                for (const seg of segmenter.segment(q.zh)) {
                    const s = seg.segment;
                    if (seg.isWordLike && /[\u4e00-\u9fff\u3400-\u4dbf]/.test(s)) {
                        finalZhHTML += `<span class="zh-word" data-word="${s.replace(/"/g, '&quot;')}">${renderString(s)}<\/span>`;
                    } else {
                        finalZhHTML += renderString(s);
                    }
                }
            } else {
                // Fallback: từng ký tự một
                for (const ch of q.zh) {
                    if (/[\u4e00-\u9fff\u3400-\u4dbf]/.test(ch)) {
                        finalZhHTML += `<span class="zh-word" data-word="${ch}">${renderChar(ch)}<\/span>`;
                    } else {
                        finalZhHTML += renderChar(ch);
                    }
                }
            }
            finalPinyinHTML = q.pinyin || "";
        }

        let html = `<b id="result-zh-wrong">${finalZhHTML}<\/b>`;
        if (finalPinyinHTML) html += `<br><i>${finalPinyinHTML}<\/i>`;
        return html;
    }

    function checkAnswer() {
        stopTimer();
        const q = history[idx];
        let user = "";
        
        if (activeMode === 'construction') {
            const targetBlocks = document.getElementById('construction-target').querySelectorAll('.word-block');
            Array.from(targetBlocks).forEach(b => {
                let txt = b.innerText.replace(/[\d\n]/g, '').trim();
                user += txt;
            });
            user = normalize(user);
        } else {
            user = normalize(inpEl.value);
        }

        const correctZh = normalize(q.zh);
        const correctPinyin = q.pinyin ? normalize(q.pinyin) : "";
        resBox.style.display = "block";
        
        let isCorrect = (user === correctZh);
        if (!isCorrect && correctPinyin && user === correctPinyin) isCorrect = true;

        if (isCorrect) {
            let speedBonus = timeElapsed < (baseTimeTarget * 0.5) ? 5 : 0;
            exp += (10 + speedBonus); 
            combo++;
            if (combo > maxCombo) maxCombo = combo;
            playBeep('correct');
            const zhSegmented = segmentChineseText(q.zh, q.viPlus); // truyền viPlus
            resBox.innerHTML = `Chính xác! ✓ <span style="font-size:0.8rem; color:#e67e22">(+${10 + speedBonus} EXP)<\/span><br><b id="result-zh-correct">${zhSegmented}<\/b>` + (q.pinyin ? `<br><i>${q.pinyin}<\/i>` : '');
            attachWordClickListeners(document.getElementById('result-zh-correct'));
            resBox.className = 'res-correct';
            if (!globalProgress[q.vi]) {
                globalProgress[q.vi] = true;
                // Chỉ backup local, KHÔNG gọi API server - sẽ lưu batch 1 lần khi kết thúc bài
                backupProgressLocal();
            }
            activePool = activePool.filter(item => item.vi !== q.vi);
        } else {
            exp = Math.max(0, exp - 2); combo = 0;
            playBeep('wrong');
            let msg = `Chưa đúng!`;
            let answerStr = "";
            if (!isCorrect && user) {
                answerStr = getHighlightedAnswerHTML(user, q);
            } else {
                const zhSegWrong = segmentChineseText(q.zh, q.viPlus); // truyền viPlus
                answerStr = `<b id="result-zh-wrong">${zhSegWrong}<\/b>` + (q.pinyin ? `<br><i>${q.pinyin}<\/i>` : '');
            }
            resBox.innerHTML = `${msg}<br>Đáp án: ${answerStr}`;
            attachWordClickListeners(document.getElementById('result-zh-wrong'));
            resBox.className = 'res-wrong';
            if (!isCorrect) {
                mistakesInLesson++;
                inpEl.classList.add('shake', 'wrong-flash');
                setTimeout(() => inpEl.classList.remove('shake', 'wrong-flash'), 500);
            }
        }
        playCurrentAudio();
        inpEl.disabled = true;
        isReviewing = true;
        btnMain.innerText = "Tiếp theo (Enter)";
        updateStats();
    }



    // Lưu backup tiến trình vào localStorage sau mỗi câu đúng
    // Không gọi API server - nhanh, không bao giờ block UI
    function backupProgressLocal() {
        if (!isProgressLoaded) return; // Bảo vệ: chưa tải xong server data thì không ghi
        try {
            localStorage.setItem('hsk_progress_temp', JSON.stringify(globalProgress));
        } catch(e) {

        }

    // Lưu 1 lần duy nhất lên server khi bài kết thúc hoặc người dùng thoát ngang
    // isVictory: true = màn hình chiến thắng, false = thoát ngang
    function saveProgressAndStats(isVictory) {
        if (progressAlreadySaved) return; // Chống lưu trùng
        progressAlreadySaved = true;

        if (!currentEmail || !currentToken) return;

        const playTimeSeconds = (Date.now() - sessionStartTime) / 1000;
        const gameStats = isVictory ? {
            totalQuestions: totalQuestions,
            isPerfect: (mistakesInLesson === 0),
            playTimeSeconds: playTimeSeconds
        } : null;

        // Gọi song song cả hai: lưu tiến trình câu hỏi + cập nhật stats/exp
        google.script.run
            .withSuccessHandler(function(r) {
                if (r && r.error === "UNAUTHORIZED") { handleUnauthorized(); return; }
                // Silent on success or other errors
            })
            .saveUserProgress(currentEmail, currentToken, globalProgress);

        if (isVictory && gameStats) {
            google.script.run
                .withSuccessHandler(function(res) {
                    if (res && res.success) {
                        // Cập nhật âm thầm badge danh hiệu trên UI
                        const userBadge = document.getElementById('user-title-badge');
                        if (userBadge) userBadge.innerText = res.title.split(' ')[0];
                    }
                })
                .updateUserStats(currentEmail, currentToken, exp, maxCombo, true, gameStats);
        }
    }

    function playCurrentAudio() {
        if (idx < 0 || idx >= history.length) return;
        const rawText = history[idx].zh;
        if (!rawText) return;
        // Loại bỏ dấu | (phân tách admin) để giọng đọc liền mạch, tự nhiên
        const text = rawText.replace(/\|/g, '');
        window.speechSynthesis.cancel();
        let msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'zh-CN';
        msg.rate = parseFloat(document.getElementById('audio-speed').value) || 1.0;
        if (availableVoices.length > 0 && voiceSelect.value !== "") {
            const selectedVoice = availableVoices[voiceSelect.value];
            if (selectedVoice) msg.voice = selectedVoice;
        }
        window.speechSynthesis.speak(msg);
    }

                    }());
                }
                return;
            }
            let nextQ = activePool[Math.floor(Math.random() * activePool.length)];
            if (activePool.length > 1 && history[idx] && nextQ.vi === history[idx].vi) {
                const alt = activePool.find(i => i.vi !== history[idx].vi);
                if (alt) nextQ = alt;
            }
            history.push(nextQ);
        }
        idx++;
        render();
    }

    function goBack() {
        if (idx > 0) { idx--; render(); }
    }

    function render() {
        isReviewing = false;
        resBox.style.display = "none";
        resBox.className = "";
        resBox.innerHTML = "";
        closeWordPopup();
        const q = history[idx];
        viEl.innerText = q.vi;
        
        if (activeMode === 'construction') {
            document.getElementById('typing-area').classList.add('hidden');
            document.getElementById('construction-area').classList.remove('hidden');
            prepareConstructionTask(q);
        } else {
            document.getElementById('typing-area').classList.remove('hidden');
            document.getElementById('construction-area').classList.add('hidden');
            inpEl.value = "";
            inpEl.disabled = false;
            setTimeout(() => inpEl.focus(), 50);
        }
        
        btnMain.innerText = "Kiểm tra (Enter)";
        updateStats();

        // Tự động đọc tiếng Việt nếu muốn (bỏ qua, chỉ hiện chữ)
        // start timer
        startTimer();
    }

    function updateStats() {
        const rem = activePool.length;
        document.getElementById('rem-count').innerText = rem;
        const percent = ((totalQuestions - rem) / totalQuestions) * 100;
        document.getElementById('progress-fill').style.width = percent + "%";
        document.getElementById('exp-val').innerText = exp;
        const cb = document.getElementById('combo-badge');
        if (combo >= 2) {
            cb.innerText = `Combo x${combo} 🔥`;
            cb.classList.add('active');
            cb.classList.remove('pop');
            void cb.offsetWidth;
            cb.classList.add('pop');
        } else {
            cb.classList.remove('active', 'pop');
        }
    }

    window.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); handleLogic(); }
        else if (e.key === 'Control') { e.preventDefault(); playCurrentAudio(); }
    });

    // Lưu tiến trình khi người dùng chuyển tab/ tắt màn hình / đóng trình duyệt
    // Đây là cơ chế hiện đại thay thế onbeforeunload (vốn bị nhiều trình duyệt chặn)
    document.addEventListener('visibilitychange', function() {
        if (document.visibilityState === 'hidden') {
            // Chỉ lưu nếu đang ở giữa bài học (activePool có dữ liệu) và chưa lưu từ Victory
            const isPlayingLesson = activePool.length > 0 || (history.length > 0 && !progressAlreadySaved);
            if (isPlayingLesson) {
                saveProgressAndStats(false);
            }
        }
    });
    // --- FULLSCREEN TOGGLE LOGIC ---
    function initFullscreen() {
        // Tạo nút bấm Fullscreen
        const fsBtn = document.createElement('div');
        fsBtn.id = 'fs-toggle-btn';
        fsBtn.innerHTML = '⛶'; // Biểu tượng fullscreen
        fsBtn.style.cssText = `
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 44px;
            height: 44px;
            background: rgba(33, 150, 243, 0.8);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            z-index: 9999;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        `;
        
        fsBtn.onclick = function() {
            if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.mozFullScreenElement && !document.msFullscreenElement) {
                // Vào toàn màn hình
                const el = document.documentElement;
                if (el.requestFullscreen) el.requestFullscreen();
                else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
                else if (el.mozRequestFullScreen) el.mozRequestFullScreen();
                else if (el.msRequestFullscreen) el.msRequestFullscreen();
                fsBtn.innerHTML = '✕';
                fsBtn.style.background = 'rgba(231, 76, 60, 0.8)';
            } else {
                // Thoát toàn màn hình
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                else if (document.mozCancelFullScreen) document.mozCancelFullScreen();
                else if (document.msExitFullscreen) document.msExitFullscreen();
                fsBtn.innerHTML = '⛶';
                fsBtn.style.background = 'rgba(33, 150, 243, 0.8)';
            }
        };

        // Lắng nghe sự kiện thay đổi fullscreen để cập nhật icon (nếu người dùng bấm nút Esc chẳng hạn)
        const updateFsIcon = () => {
            const isFs = document.fullscreenElement || document.webkitFullscreenElement;
            fsBtn.innerHTML = isFs ? '✕' : '⛶';
            fsBtn.style.background = isFs ? 'rgba(231, 76, 60, 0.8)' : 'rgba(33, 150, 243, 0.8)';
        };
        document.addEventListener('fullscreenchange', updateFsIcon);
        document.addEventListener('webkitfullscreenchange', updateFsIcon);

        document.body.appendChild(fsBtn);
    }

    // Khởi chạy sau khi trang load
    window.addEventListener('load', initFullscreen);
<\/script>
